[project]
name = "lekiwi_lerobot"
version = "0.1.0"
authors = [{ name = "Franco Cipollone", email = "franco.c@ekumenlabs.com"}]
description = "Lekiwi lerobot integration."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "lekiwi_teleoperate>=0.1.0",
    "lerobot==0.4.0",
    "numpy>=1.24.0",
]

[tool.uv.sources]
lekiwi_teleoperate = { workspace = true }

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = ["pytest >=8.1.1", "ruff >=0.9.1"]

[project.scripts]
lekiwi_lerobot_record = "lekiwi_lerobot.record:main"
lekiwi_lerobot_replay = "lekiwi_lerobot.replay:main"
lekiwi_lerobot_evaluate = "lekiwi_lerobot.evaluate:main"
lekiwi_lerobot_run_policy = "lekiwi_lerobot.run_policy:main"
