[project]
name = "lekiwi_sim"
version = "0.1.0"
authors = [{ name = "Ari Lowy", email = "arilow@ekumenlabs.com" }]
description = "Python package for simulating the Lekiwi robot in MuJoCo."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mujoco>=3.2.6",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = ["pytest >=8.1.1", "ruff >=0.9.1"]

[project.scripts]
lekiwi_sim = "lekiwi_sim.main:main"
